<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <!-- Robust Fetch Shield to prevent Uncaught TypeError when libraries or environment scripts try to assign to fetch -->
    <script>
      (function() {
        try {
          var originalFetch = window.fetch || (typeof globalThis !== 'undefined' ? globalThis.fetch : undefined);
          var currentFetch = originalFetch;
          
          try {
            delete window.fetch;
          } catch (err) {}
          
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return currentFetch;
            },
            set: function(val) {
              currentFetch = val;
            },
            configurable: true,
            enumerable: true
          });

          if (typeof globalThis !== 'undefined') {
            try {
              delete globalThis.fetch;
            } catch (err) {}
            Object.defineProperty(globalThis, 'fetch', {
              get: function() {
                return currentFetch;
              },
              set: function(val) {
                currentFetch = val;
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('Fetch safeguard shield setup failed:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
